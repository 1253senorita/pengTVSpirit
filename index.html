<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Blackboard Engine [💎Blueberry & 🍇Grape]</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/rxjs/7.8.1/rxjs.umd.min.js"></script>
    <style>
        :root { --bsf-color: #d63031; --ssf-color: #f1c40f; --bg: #f8f9fa; --dark: #2d3436; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .BSF_Left_Zone { width: 350px; background: white; border-right: 2px solid #eee; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .SSF_Right_Zone { flex: 1; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; background: #fdfdfd; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .log-box { flex: 1; background: var(--dark); color: #74b9ff; padding: 10px; border-radius: 8px; font-family: monospace; overflow-y: auto; font-size: 0.85rem; }
        .shell-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--dark); display: flex; justify-content: center; gap: 50px; align-items: center; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; background: #eee; }
        /* 뉴모피즘 스타일 추가 */
        .neumorphism-btn { 
            background: #f8f9fa; border: none; padding: 10px 20px; border-radius: 10px; 
            box-shadow: 5px 5px 10px #bebebe, -5px -5px 10px #ffffff; cursor: pointer; transition: 0.2s;
        }
        .neumorphism-btn:active { box-shadow: inset 5px 5px 10px #bebebe, inset -5px -5px 10px #ffffff; }
    </style>
</head>
<body>

    <aside class="BSF_Left_Zone">
        <div>
            <h2>🍎 BSF Control</h2>
            <div id="SSF_Status_Badge" class="badge">SYSTEM IDLE</div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column;">
            <h2>🍎 BSF Logs</h2>
            <div id="BSF_Log_Console" class="log-box"></div>
        </div>
    </aside>

    <main class="SSF_Right_Zone">
        <div id="SSF_Peer_Layer" style="display:none;" class="card">
            <h4 style="margin:0; color:#00b894;">💛 SSF: Remote Peer Connected</h4>
            <div id="SSF_Peer_Info" style="font-family: monospace;"></div>
        </div>
        <div class="card" style="margin-top: 20px; flex: 1;">
            <h2>💛 SSF Shared Memory</h2>
            <div id="SSF_Dynamic_Sheet">
                <p>💛 SSF: 명령 대기 중...</p>
            </div>
        </div>
    </main>

    <footer class="shell-bar" id="A-Area">
        <button data-ref="SENSOR_301" class="neumorphism-btn">🍎 🍎🍎🍎🍎센서 분석</button>
        <button data-ref="PTT_101" class="neumorphism-btn" style="color:#74b9ff;">🍎🍎🍎 🍎🍎PTT 통신</button>
    </footer>

    <script>
        const { BehaviorSubject } = rxjs;

        // 1. 데이터 저장소 (보안을 위해 스크립트 내부에 정의)
        const ActionRegistry = {
            "SENSOR_301": { id: 301, name: "Target-Alpha", score: 99, mode: "SCAN" },              //🍎🍎🍎 🍎🍎
            "PTT_101": { id: 101, name: "PTT-Channel-01", score: 100, mode: "VOICE" }            //🍎🍎🍎 🍎🍎
        };

        class SpiritEngine {
            constructor() {
                this.state$ = new BehaviorSubject({ status: 'IDLE', logs: [], data: [], peer: null });
            }

            update(patch) { 
                this.state$.next({ ...this.state$.getValue(), ...patch }); 
            }

            log(msg) {
                const current = this.state$.getValue();
                const time = `[${new Date().toLocaleTimeString()}]`;
                this.state$.next({ ...current, logs: [`<div>${time} ${msg}</div>`, ...current.logs] });
            }
        }

        const engine = new SpiritEngine();

        // 🍇 수신부 로직 (B 시트 업데이트)
        engine.state$.subscribe(state => {
            document.getElementById('BSF_Log_Console').innerHTML = state.logs.join('');
            const sheet = document.getElementById('SSF_Dynamic_Sheet');
            const statusBadge = document.getElementById('SSF_Status_Badge');
            
            statusBadge.innerText = `SYSTEM ${state.status}`;

            if (state.status === 'VOICE_ACTIVE') {
                sheet.innerHTML = `<h3>🎙️ 💛 SSF: 보이스 실시간 세션</h3><p>채널 점유 중... (ID: ${state.activeId})</p>`;
            } else if (state.data.length > 0) {
                let html = `<h3>📊 💛 SSF: 데이터 분석 리포트</h3><table border="1" width="100%" style="border-collapse:collapse;">`;
                html += `<thead><tr><th>TARGET NAME</th><th>SCORE</th></tr></thead><tbody>`;
                html += state.data.map(d => `<tr><td>${d.name}</td><td>${d.score}</td></tr>`).join('');
                sheet.innerHTML = html + `</tbody></table>`;
            } else {
                sheet.innerHTML = `<p>💛 SSF: 현재 활성화된 데이터 시트가 없습니다.</p>`;
            }

            const peerLayer = document.getElementById('SSF_Peer_Layer');
            if (state.peer) {
                peerLayer.style.display = 'block';
                document.getElementById('SSF_Peer_Info').innerText = state.peer;
            } else {
                peerLayer.style.display = 'none';
            }
        });
//
        // 🚀 🚀통합 이벤트 리스너: A-Area의🚀🚀 버튼 클릭 감지🚀🚀                                  //  🍎🍎🍎 🍎🍎
        document.getElementById('A-Area').addEventListener('click', (e) => {                              //🍎🍎🍎 🍎🍎
            const refKey = e.target.dataset.ref;
            
            if (refKey && ActionRegistry[refKey]) {
                const payload = ActionRegistry[refKey];
                handleSmartTrigger(payload);
            }
        });

        // 💎 공통 핸들러: 데이터 분석 및 PTT 분기 처리
        function handleSmartTrigger(data) {
            if (data.mode === "SCAN") {
                engine.log(`🍎 BSF: [${data.name}] 분석 시작 (코드:${data.id})`);
                engine.update({ status: 'PROCESSING', data: [data] });
                
                setTimeout(() => {
                    engine.log("💛 SSF: 분석 완료 및 결과 업로드");
                    engine.update({ status: 'COMPLETED', peer: `Node-${data.id}-Active` });
                }, 1200);

            } else if (data.mode === "VOICE") {
                engine.log(`🍎 BSF: ${data.name} 채널 오픈`);
                engine.update({ status: 'VOICE_ACTIVE', activeId: data.id, peer: null });
                
                setTimeout(() => {
                    engine.update({ status: 'IDLE' });
                    engine.log("🍎 BSF: PTT 세션 종료");
                }, 3000);
            }
        }
    </script>
</body>
</html>
