<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Blackboard Engine v5.2 Spirit</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/rxjs/7.8.1/rxjs.umd.min.js"></script>
    <style>
        :root { --bg: #f8f9fa; --card: #ffffff; --primary: #0984e3; --dark: #2d3436; --accent: #fab1a0; }
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 20px; 
            padding-bottom: 100px; /* 하단바 공간 확보 */
            display: flex; 
            gap: 20px; 
            height: 100vh;
            box-sizing: border-box;
        }

        /* 시트 레이어 (중앙 콘텐츠) */
        .panel { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); flex: 1; overflow-y: auto; }
        h2 { margin-top: 0; font-size: 1.2rem; color: var(--dark); border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        
        /* 상태 표시기 */
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-bottom: 15px; }
        .IDLE { background: #dfe6e9; color: #636e72; }
        .PROCESSING { background: #ffeaa7; color: #d63031; animation: pulse 1.5s infinite; }
        .COMPLETED { background: #55efc4; color: #00b894; }

        /* 로그창 */
        #log-container { height: 200px; overflow-y: auto; background: var(--dark); color: var(--accent); padding: 10px; font-family: monospace; font-size: 0.9rem; border-radius: 8px; }
        .log-entry { margin-bottom: 4px; border-left: 2px solid #e17055; padding-left: 8px; }

        /* 테이블 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
        
        /* [앱쉘 레이어] 하단 펭TV 바 - 시트 위에 떠 있는 블랭킷 */
        .app-shell-bottom {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 85px;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 9999;
            box-shadow: 0 -8px 20px rgba(0,0,0,0.4);
        }

        /* 뉴모피즘 버튼 스타일 */
        .shell-btn {
            background: var(--dark); 
            color: var(--accent); 
            border: none;
            padding: 14px 28px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 5px 5px 10px #1e2223, -5px -5px 10px #3c4649;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .shell-btn:hover { color: white; transform: translateY(-2px); }
        .shell-btn:active {
            box-shadow: inset 5px 5px 10px #1e2223, inset -5px -5px 10px #3c4649;
            transform: translateY(0);
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="panel" style="max-width: 350px;">
        <h2>🕹️ Engine Control</h2>
        <div id="status-display" class="status-badge IDLE">SYSTEM IDLE</div>
        <p style="font-size: 0.85rem; color: #636e72;">하단 펭TV 바의 입체 버튼을 눌러보세요!</p>
        
        <h2 style="margin-top:20px;">📜 Blackboard Logs</h2>
        <div id="log-container"></div>
    </div>

    <div class="panel">
        <h2>🧠 Blackboard Shared Memory</h2>
        <div id="data-view">
            <p style="color: #636e72;">데이터가 대기 중입니다...</p>
        </div>
    </div>

    <div class="app-shell-bottom">
        <button class="shell-btn" onclick="triggerSensor()">
            <span>📡</span> 센서 데이터 분석 (301)
        </button>
        <button class="shell-btn" style="color: #74b9ff;" onclick="alert('PTT 시작!')">
            <span>🎙️</span> PTT 통신 (101)
        </button>
    </div>

<script>
    const { BehaviorSubject, filter, delay } = rxjs;

    // --- 1. Blackboard (심장) ---
    class Blackboard {
        constructor() {
            this.state$ = new BehaviorSubject({
                status: 'IDLE',
                rawData: [],
                processedData: [],
                logs: ["Spirit 엔진이 가동되었습니다."]
            });
        }
        update(patch) {
            const current = this.state$.getValue();
            this.state$.next({ ...current, ...patch });
        }
        addLog(msg) {
            const current = this.state$.getValue();
            const time = new Date().toLocaleTimeString();
            this.state$.next({ ...current, logs: [`[${time}] ${msg}`, ...current.logs] });
        }
        get stream() { return this.state$.asObservable(); }
    }

    const bb = new Blackboard();

    // --- 2. 전문가 (Knowledge Source) ---
    bb.stream.pipe(
        filter(s => s.status === 'PROCESSING'),
        delay(1500)
    ).subscribe(state => {
        const filtered = state.rawData.filter(d => d.score >= 80);
        bb.addLog("분석 전문가: 필터링 및 리포트 생성 완료.");
        bb.update({ status: 'COMPLETED', processedData: filtered });
    });

    // --- 3. UI 렌더러 ---
    bb.stream.subscribe(state => {
        document.getElementById('status-display').innerText = `SYSTEM ${state.status}`;
        document.getElementById('status-display').className = `status-badge ${state.status}`;

        const logBox = document.getElementById('log-container');
        logBox.innerHTML = state.logs.map(l => `<div class="log-entry">${l}</div>`).join('');

        const view = document.getElementById('data-view');
        if (state.status === 'IDLE') {
            view.innerHTML = `<p>데이터를 유입시키려면 하단 분석 버튼을 누르세요.</p>`;
        } else {
            const data = state.status === 'COMPLETED' ? state.processedData : state.rawData;
            let html = `<h3>${state.status === 'COMPLETED' ? '✅ 분석 결과 리포트' : '⏳ 데이터 분석 전문가 가동 중...'}</h3>`;
            html += `<table><thead><tr><th>이름</th><th>점수</th></tr></thead><tbody>`;
            html += data.map(d => `<tr><td>${d.name}</td><td>${d.score}</td></tr>`).join('');
            html += `</tbody></table>`;
            view.innerHTML = html;
        }
    });

    // 브릿지 함수
    function triggerSensor() {
        bb.addLog("Bridge: ID 301 인텐트 수신.");
        bb.update({
            status: 'PROCESSING',
            rawData: [
                { name: '펭수', score: 98 }, { name: '범이', score: 75 },
                { name: '스피릿', score: 88 }, { name: '플라이', score: 60 }
            ]
        });
    }
</script>
</body>
</html>
